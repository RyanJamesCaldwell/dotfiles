# Starship prompt palette: ashfall
add_newline = true
command_timeout = 1000

format = "$directory$git_branch$custom_chezmoi$git_metrics$time$line_break$character"

[character]
success_symbol = "[>](#90aea0) "
error_symbol = "[>](#ed4e35) "
vimcmd_symbol = "[<](#688581) "

[directory]
style = "bold #90aea0"
truncation_length = 3
truncation_symbol = ".../"

[git_branch]
symbol = "git:"
format = "[$symbol$branch]($style) "
style = "bold #ef5137"

[git_metrics]
disabled = false
only_nonzero_diffs = true
added_style = "bold #90aea0"
deleted_style = "bold #ed4e35"
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

[custom.chezmoi]
command = "printf 'chezmoi'"
when = "test \"$PWD\" = \"$HOME/.local/share/chezmoi\""
format = "[$output]($style) "
style = "bold dimmed #c14736"

[golang]
symbol = "go:"
format = "[$symbol$version]($style) "
style = "bold #688581"

[nodejs]
symbol = "node:"
format = "[$symbol$version]($style) "
style = "bold #90aea0"

[python]
symbol = "py:"
format = "[$symbol$version]($style) "
style = "bold #fbedbd"

[package]
symbol = "pkg:"
display_private = true
format = "[$symbol$version]($style) "
style = "bold dimmed #665855"

[azure]
format = "[azure:$subscription]($style) "
style = "bold dimmed #688581"

[aws]
format = "[aws:$profile]($style) "
style = "bold dimmed #c14736"

[time]
disabled = false
format = "[$time]($style) "
style = "dimmed #d1d3b2"
time_format = "%H:%M:%S"
