name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CI: "1"
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_ENV_HINTS: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: "1"

jobs:
  validate:
    name: Validate dotfiles
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install validation tools
        run: brew install chezmoi stylua neovim

      - name: Validate Brewfile
        run: |
          ruby -c Brewfile
          brew bundle list --file=Brewfile --all >/dev/null

      - name: Validate chezmoi render
        run: |
          set -euo pipefail
          ci_workdir="$PWD/../dotfiles-ci"
          rm -rf "$ci_workdir/chezmoi"
          mkdir -p "$ci_workdir/chezmoi/home" "$ci_workdir/chezmoi/cache" "$ci_workdir/chezmoi/state"
          cat > "$ci_workdir/chezmoi/config.yaml" <<'YAML'
          data:
            profile: personal
          YAML
          chezmoi \
            --no-tty \
            --source="$PWD" \
            --destination="$ci_workdir/chezmoi/home" \
            --cache="$ci_workdir/chezmoi/cache" \
            --persistent-state="$ci_workdir/chezmoi/state/chezmoi.boltdb" \
            --config="$ci_workdir/chezmoi/config.yaml" \
            --refresh-externals=never \
            apply --dry-run --verbose >/dev/null

      - name: Check Lua formatting
        run: |
          find dot_config/nvim -name '*.lua' -print0 \
            | xargs -0 stylua --check --config-path dot_config/nvim/dot_stylua.toml

      - name: Cache Neovim plugins
        uses: actions/cache@v4
        with:
          path: .ci/nvim-data/nvim/lazy
          key: ${{ runner.os }}-lazy-${{ hashFiles('dot_config/nvim/lazy-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-lazy-

      - name: Validate Neovim plugins
        run: |
          set -euo pipefail
          mkdir -p .ci/nvim-home .ci/nvim-data .ci/nvim-state .ci/nvim-cache
          HOME="$PWD/.ci/nvim-home" \
          XDG_CONFIG_HOME="$PWD/dot_config" \
          XDG_DATA_HOME="$PWD/.ci/nvim-data" \
          XDG_STATE_HOME="$PWD/.ci/nvim-state" \
          XDG_CACHE_HOME="$PWD/.ci/nvim-cache" \
            nvim --headless "+Lazy! sync" +qa
